name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Build packages
        run: npx turbo run build --filter=@native-mate/core --filter=@native-mate/cli --filter=@native-mate/mcp --filter=@native-mate/registry --filter=@native-mate/docs

      - name: Run tests
        run: npx vitest run

      - name: Lint packages
        run: npx turbo run lint --filter=@native-mate/core --filter=@native-mate/cli --filter=@native-mate/mcp --filter=@native-mate/registry --filter=@native-mate/docs

  # ──────────────────────────────────────────────────────────
  # npm publish — DISABLED until ready to launch
  # To enable: remove `if: false` and add NPM_TOKEN to repo secrets
  # ──────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Build packages
        run: npx turbo run build --filter=@native-mate/core --filter=@native-mate/cli --filter=@native-mate/mcp --filter=@native-mate/registry

      - name: Publish @native-mate/core
        working-directory: packages/core
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @native-mate/cli
        working-directory: packages/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @native-mate/mcp
        working-directory: packages/mcp
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
